
      general {
        border_size = 1
        gaps_in = 8
        gaps_out = 8,8,8,8
        col.active_border = $primary
        col.inactive_border = $surface_container_high
        layout = scrolling
      }
      decoration {
        rounding = 0
        active_opacity = 1
        inactive_opacity = 0.7
        shadow {
            enabled = false
            range = 0
        }
      }

      